name: Infra

trigger:
- main
- features/*

# =========================================================
# DEFAULT AGENT POOL
# =========================================================
pool:
  name: InfraPool

stages:

# =========================================================
# PRE-COMMIT STAGE
# =========================================================
- stage: PreCommit
  displayName: Pre Commit

  jobs:
  - job: Terraform_PreCheck
    displayName: Terraform Init Validate

    steps:

    - checkout: self

    # -----------------------------------------------------
    # Terraform Install
    # -----------------------------------------------------
    - task: TerraformInstaller@1
      displayName: Terraform Installer
      inputs:
        terraformVersion: 'latest'

    # -----------------------------------------------------
    # Restore Terraform Cache
    # -----------------------------------------------------
    - task: Cache@2
      displayName: Restore Terraform Cache
      inputs:
        key: 'terraform | "$(Agent.OS)" | environment/dev/.terraform.lock.hcl'
        restoreKeys: |
          terraform | "$(Agent.OS)"
        path: '$(System.DefaultWorkingDirectory)/environment/dev/.terraform'

    # -----------------------------------------------------
    # Terraform Init
    # -----------------------------------------------------
    - task: TerraformTask@5
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(System.DefaultWorkingDirectory)/environment/dev'
        commandOptions: '-reconfigure'
        backendServiceArm: 'Service-connection-007'
        backendAzureRmStorageAccountName: 'storagebackend007'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: 'dev.tfstate'

    # -----------------------------------------------------
    # Terraform Validate
    # -----------------------------------------------------
    - task: TerraformTask@5
      displayName: Terraform Validate
      inputs:
        provider: 'azurerm'
        command: 'validate'
        workingDirectory: '$(System.DefaultWorkingDirectory)/environment/dev'

    # -----------------------------------------------------
    # Terraform Format
    # -----------------------------------------------------
    - task: TerraformTask@5
      displayName: Terraform Fmt
      inputs:
        provider: 'azurerm'
        command: 'custom'
        workingDirectory: '$(System.DefaultWorkingDirectory)/environment/dev'
        outputTo: 'console'
        customCommand: 'fmt'
        environmentServiceNameAzureRM: 'Service-connection-007'


# =========================================================
# SCANNING STAGE
# =========================================================
- stage: Scanning
  displayName: Scanning

  jobs:

  # -----------------------------------------------------
  # TFSEC SCAN
  # -----------------------------------------------------
  - job: TFSecScanning
    displayName: TFSec Scanning

    steps:

    - checkout: self

    - task: tfsec@1
      displayName: TF Sec Scan
      inputs:
        version: 'v1.26.0'

  # -----------------------------------------------------
  # TFLINT SCAN
  # -----------------------------------------------------
  - job: TfLint_Job
    displayName: Tflint Scanning
    dependsOn: TFSecScanning

    steps:

    - checkout: self

    # -----------------------------------------------------
    # Restore TFLint Cache
    # -----------------------------------------------------
    - task: Cache@2
      displayName: Restore TFLint Cache
      inputs:
        key: 'tflint | "$(Agent.OS)"'
        restoreKeys: |
          tflint | "$(Agent.OS)"
        path: '$(USERPROFILE)'

    # -----------------------------------------------------
    # Download TFLint
    # -----------------------------------------------------
    - powershell: |
        if (-Not (Test-Path "$env:USERPROFILE\tflint.exe")) {

          Invoke-WebRequest `
          -Uri "https://github.com/terraform-linters/tflint/releases/latest/download/tflint_windows_amd64.zip" `
          -OutFile "$env:USERPROFILE\tflint.zip"

          Expand-Archive `
          -Path "$env:USERPROFILE\tflint.zip" `
          -DestinationPath "$env:USERPROFILE" -Force

          Remove-Item "$env:USERPROFILE\tflint.zip"
        }
      displayName: Download and Setup TFLint

    # -----------------------------------------------------
    # Execute TFLint
    # -----------------------------------------------------
    - powershell: |
        & "$env:USERPROFILE\tflint.exe" --version
        & "$env:USERPROFILE\tflint.exe"
      displayName: Execute TFLint
      workingDirectory: '$(System.DefaultWorkingDirectory)/environment/dev'
      continueOnError: true


# =========================================================
# PLAN STAGE
# =========================================================
- stage: Plan
  displayName: Plan & Review

  jobs:
  - job: TerraformPlan
    displayName: Terraform Plan

    steps:

    - checkout: self

    # -----------------------------------------------------
    # Restore Terraform Cache
    # -----------------------------------------------------
    - task: Cache@2
      displayName: Restore Terraform Cache
      inputs:
        key: 'terraform | "$(Agent.OS)" | environment/dev/.terraform.lock.hcl'
        restoreKeys: |
          terraform | "$(Agent.OS)"
        path: '$(System.DefaultWorkingDirectory)/environment/dev/.terraform'

    # -----------------------------------------------------
    # Terraform Init
    # -----------------------------------------------------
    - task: TerraformTask@5
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(System.DefaultWorkingDirectory)/environment/dev'
        commandOptions: '-reconfigure'
        backendServiceArm: 'Service-connection-007'
        backendAzureRmStorageAccountName: 'storagebackend007'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: 'dev.tfstate'

    # -----------------------------------------------------
    # Download tfvars
    # -----------------------------------------------------
    - task: DownloadSecureFile@1
      displayName: Download tfvars
      name: terraformtfvars
      inputs:
        secureFile: 'terraform.tfvars'

    # -----------------------------------------------------
    # Terraform Plan
    # -----------------------------------------------------
    - task: TerraformTask@5
      displayName: Terraform Plan
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: '$(System.DefaultWorkingDirectory)/environment/dev'
        commandOptions: '-var-file=$(terraformtfvars.securefilepath)'
        environmentServiceNameAzureRM: 'Service-connection-007'


# =========================================================
# APPROVAL STAGE
# =========================================================
- stage: Approval
  displayName: Manual Approval
  dependsOn: Plan

  jobs:
  - deployment: ApprovalGate

    displayName: Approval Gate

    environment: approval gate

    strategy:
      runOnce:
        deploy:
          steps:

          - powershell: |
              Write-Host "Manual Approval Completed Successfully"
            displayName: Approval Success


# =========================================================
# DEPLOY STAGE
# =========================================================
- stage: Deploy
  displayName: Terraform Apply
  dependsOn: Approval

  jobs:
  - job: TerraformApply

    displayName: Terraform Apply

    # =====================================================
    # SECOND AGENT ONLY FOR APPLY
    # =====================================================
    pool:
      name: InfraPool
      demands:
        - Infra -equals Infrapipeline

    steps:

    # -----------------------------------------------------
    # IMPORTANT
    # NEW AGENT NEEDS CHECKOUT
    # -----------------------------------------------------
    - checkout: self

    # -----------------------------------------------------
    # Restore Terraform Cache
    # -----------------------------------------------------
    - task: Cache@2
      displayName: Restore Terraform Cache
      inputs:
        key: 'terraform | "$(Agent.OS)" | environment/dev/.terraform.lock.hcl'
        restoreKeys: |
          terraform | "$(Agent.OS)"
        path: '$(System.DefaultWorkingDirectory)/environment/dev/.terraform'

    # -----------------------------------------------------
    # Terraform Init
    # -----------------------------------------------------
    - task: TerraformTask@5
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(System.DefaultWorkingDirectory)/environment/dev'
        commandOptions: '-reconfigure'
        backendServiceArm: 'Service-connection-007'
        backendAzureRmStorageAccountName: 'storagebackend007'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: 'dev.tfstate'

    # -----------------------------------------------------
    # Download tfvars
    # -----------------------------------------------------
    - task: DownloadSecureFile@1
      displayName: Download tfvars
      name: terraformtfvars
      inputs:
        secureFile: 'terraform.tfvars'

    # -----------------------------------------------------
    # Terraform Apply
    # -----------------------------------------------------
    - task: TerraformTask@5
      displayName: Terraform Apply
      inputs:
        provider: 'azurerm'
        command: 'apply'
        workingDirectory: '$(System.DefaultWorkingDirectory)/environment/dev'
        commandOptions: '-auto-approve -var-file=$(terraformtfvars.securefilepath)'
        environmentServiceNameAzureRM: 'Service-connection-007'